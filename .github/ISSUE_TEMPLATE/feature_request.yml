name: Feature request
description: Suggest a new Blockwright capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the real scenario from a player, server owner, developer, or operator perspective.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you already have an idea, describe the desired interaction, API, or behavior.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - apps/controller
        - plugins/fabric
        - plugins/paper
        - docs
        - Not sure
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
