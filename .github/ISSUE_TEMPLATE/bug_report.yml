name: Bug report
description: 报告 Blockwright 的缺陷或异常行为
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明发生了什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请写出最小复现步骤。
      placeholder: |
        1. 启动 controller
        2. 在 Minecraft 输入 /bw ...
        3. 观察到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: 影响组件
      options:
        - apps/controller
        - plugins/fabric
        - plugins/paper
        - docs
        - 不确定
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      render: text
