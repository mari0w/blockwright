name: Bug report
description: Report a Blockwright defect or unexpected behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe what happened.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Start the controller
        2. Enter /bw ... in Minecraft
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - apps/controller
        - plugins/fabric
        - plugins/paper
        - docs
        - Not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
