name: CI

on:
  push:
  pull_request:

jobs:
  controller:
    name: Rust controller
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run tests
        run: cargo test --workspace

      - name: Install coverage tool
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Enforce 80 percent coverage
        run: cargo llvm-cov --workspace --all-targets --ignore-filename-regex 'apps/controller/src/main.rs' --fail-under-lines 80

  paper-plugin:
    name: Paper plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.12"

      - name: Run plugin tests and build
        working-directory: plugins/paper
        run: gradle build --no-daemon
