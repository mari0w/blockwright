<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Blockwright social preview</title>
  <desc id="desc">Blockwright 面向 Minecraft Java 版生产级 AI 控制层的 GitHub 社交预览图。</desc>
  <defs>
    <linearGradient id="shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#07100c" stop-opacity="0.98"/>
      <stop offset="0.48" stop-color="#07100c" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#07100c" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07100c" stop-opacity="0"/>
      <stop offset="1" stop-color="#07100c" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#48d789"/>
      <stop offset="1" stop-color="#1ca862"/>
    </linearGradient>
    <style>
      .eyebrow{font:800 28px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#48d789;letter-spacing:0}
      .title{font:900 88px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#f3f6f0;letter-spacing:0}
      .subtitle{font:650 34px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#d7e2da;letter-spacing:0}
      .small{font:800 23px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#e7f0ea;letter-spacing:0}
      .tag{font:800 22px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#07100c;letter-spacing:0}
    </style>
  </defs>
  <image href="hero-ai-assistant.jpg" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="630" fill="url(#shade)"/>
  <rect width="1200" height="630" fill="url(#bottom)"/>
  <g transform="translate(78 105)">
    <text x="0" y="0" class="eyebrow">生产级 AI 控制层</text>
    <text x="0" y="96" class="title">Blockwright</text>
    <text x="4" y="158" class="subtitle">Minecraft Java 版</text>
    <text x="4" y="207" class="subtitle">命令、工具、记录、校验</text>
    <g transform="translate(4 260)">
      <rect width="226" height="52" rx="8" fill="url(#green)"/>
      <text x="22" y="34" class="tag">Fabric 模组</text>
      <rect x="244" width="184" height="52" rx="8" fill="#e7b15d"/>
      <text x="266" y="34" class="tag">模型后端</text>
    </g>
    <text x="4" y="382" class="small">世界上下文 | 命令操作 | 构建记录 | 结果校验</text>
  </g>
</svg>
