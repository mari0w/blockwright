<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Blockwright 架构流程</title>
  <desc id="desc">Blockwright 将玩家和聊天入口、Rust controller 规划记录、Minecraft 执行端和逐块校验报告分成四个清晰阶段。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1511"/>
      <stop offset="0.58" stop-color="#151b17"/>
      <stop offset="1" stop-color="#0c1116"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#43d282"/>
      <stop offset="1" stop-color="#1aa861"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2c878"/>
      <stop offset="1" stop-color="#d58b34"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7bb7ff"/>
      <stop offset="1" stop-color="#3f7fdb"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#92a099"/>
    </marker>
    <style>
      .title{font:800 34px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#f3f6f0;letter-spacing:0}
      .subtitle{font:600 18px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#b8c3bb;letter-spacing:0}
      .stage{font:800 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#e7b15d;letter-spacing:0}
      .card-title{font:800 25px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#f3f6f0;letter-spacing:0}
      .body{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#b8c3bb;letter-spacing:0}
      .note{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#dce6df;letter-spacing:0}
      .chip{font:800 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#dce6df;letter-spacing:0}
      .panel{fill:#18201c;stroke:#354239;stroke-width:2}
      .soft-panel{fill:#111813;stroke:#2d3932;stroke-width:1.5}
      .arrow{fill:none;stroke:#92a099;stroke-width:4;stroke-linecap:round;marker-end:url(#arrow)}
      .return{fill:none;stroke:#607b6d;stroke-width:3;stroke-linecap:round;stroke-dasharray:9 10;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1180" height="620" rx="0" fill="url(#bg)"/>
  <path d="M0 476 C168 438 293 494 430 462 C594 424 736 382 919 418 C1048 444 1124 414 1180 382 L1180 620 L0 620 Z" fill="#111813"/>
  <g opacity="0.34">
    <rect x="64" y="450" width="34" height="34" fill="#24382d"/>
    <rect x="98" y="450" width="34" height="34" fill="#2f5c3e"/>
    <rect x="132" y="450" width="34" height="34" fill="#24382d"/>
    <rect x="98" y="416" width="34" height="34" fill="#4f8d54"/>
    <rect x="1004" y="422" width="38" height="38" fill="#59432a"/>
    <rect x="1042" y="422" width="38" height="38" fill="#6b5834"/>
    <rect x="1042" y="384" width="38" height="38" fill="#8a6b3a"/>
  </g>

  <text x="54" y="74" class="title">Blockwright 架构流程</text>
  <text x="54" y="108" class="subtitle">入口、AI 规划、构建记录、Minecraft 执行和校验分层协作</text>

  <g filter="url(#shadow)">
    <g transform="translate(48 158)">
      <text x="0" y="0" class="stage">01 入口</text>
      <rect x="0" y="24" width="252" height="254" rx="10" class="panel"/>
      <rect x="28" y="56" width="54" height="54" rx="8" fill="url(#green)"/>
      <text x="28" y="140" class="card-title">玩家与聊天工具</text>
      <text x="28" y="178" class="body">玩家使用 /bw 命令</text>
      <text x="28" y="206" class="body">聊天工具走 polling / stream</text>
      <text x="28" y="234" class="body">local_command 也进入 controller</text>
    </g>

    <g transform="translate(326 158)">
      <text x="0" y="0" class="stage">02 规划与记录</text>
      <rect x="0" y="24" width="252" height="254" rx="10" class="panel"/>
      <rect x="28" y="56" width="54" height="54" rx="8" fill="url(#amber)"/>
      <text x="28" y="140" class="card-title">Rust controller</text>
      <text x="28" y="178" class="body">API、队列、蓝图、构建记录</text>
      <text x="28" y="206" class="body">先保存记录</text>
      <text x="28" y="234" class="body">再下发同一份方块清单</text>
      <rect x="28" y="248" width="86" height="30" rx="7" class="soft-panel"/>
      <text x="43" y="268" class="chip">Codex CLI</text>
      <rect x="124" y="248" width="88" height="30" rx="7" class="soft-panel"/>
      <text x="141" y="268" class="chip">MCP 工具</text>
    </g>

    <g transform="translate(604 158)">
      <text x="0" y="0" class="stage">03 Minecraft 执行</text>
      <rect x="0" y="24" width="252" height="254" rx="10" class="panel"/>
      <rect x="28" y="56" width="54" height="54" rx="8" fill="url(#blue)"/>
      <text x="28" y="140" class="card-title">Fabric / Paper</text>
      <text x="28" y="178" class="body">Fabric 优先服务 HMCL 场景</text>
      <text x="28" y="206" class="body">Paper 面向独立服务端</text>
      <text x="28" y="234" class="body">通过世界方块 API 放置</text>
    </g>

    <g transform="translate(882 158)">
      <text x="0" y="0" class="stage">04 校验</text>
      <rect x="0" y="24" width="252" height="254" rx="10" class="panel"/>
      <rect x="28" y="56" width="54" height="54" rx="8" fill="url(#green)"/>
      <text x="28" y="140" class="card-title">校验报告</text>
      <text x="28" y="178" class="body">逐块读取世界状态</text>
      <text x="28" y="206" class="body">与构建记录对比</text>
      <text x="28" y="234" class="body">一致才算成功</text>
    </g>
  </g>

  <path class="arrow" d="M300 309 H326"/>
  <path class="arrow" d="M578 309 H604"/>
  <path class="arrow" d="M856 309 H882"/>
  <path class="return" d="M996 446 C872 534 562 536 452 446"/>

  <g transform="translate(70 512)">
    <rect width="1040" height="58" rx="10" fill="#111813" stroke="#2d3932" stroke-width="1.5"/>
    <text x="28" y="36" class="note">关键规则</text>
    <circle cx="154" cy="30" r="6" fill="#43d282"/>
    <text x="172" y="36" class="body">蓝图使用相对坐标</text>
    <circle cx="420" cy="30" r="6" fill="#f2c878"/>
    <text x="438" y="36" class="body">方块状态参与校验</text>
    <circle cx="708" cy="30" r="6" fill="#7bb7ff"/>
    <text x="726" y="36" class="body">真实密钥只放本地配置</text>
  </g>
</svg>
