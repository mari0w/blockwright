<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Blockwright 支持的模型</title>
  <desc id="desc">列出 Codex CLI、OpenAI、DeepSeek、豆包和 Gemini 模型后端的产品图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#09110d"/><stop offset="1" stop-color="#121b17"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4fdb8f"/><stop offset="1" stop-color="#20ad66"/></linearGradient>
    <style>
      .title{font:900 38px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#f7fbf6;letter-spacing:0}
      .sub{font:650 19px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#b8c8bd;letter-spacing:0}
      .label{font:850 24px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#f3f6f0;letter-spacing:0}
      .small{font:700 16px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#b8c8bd;letter-spacing:0}
      .tag{font:900 16px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#101411;letter-spacing:0}
    </style>
  </defs>
  <rect width="900" height="620" rx="8" fill="url(#bg)"/>
  <g opacity="0.24" stroke="#2f493a" stroke-width="1"><path d="M78 124H822M78 224H822M78 324H822M78 424H822M78 524H822"/><path d="M170 76V552M310 76V552M450 76V552M590 76V552M730 76V552"/></g>
  <text x="58" y="74" class="title">支持的 AI 模型</text>
  <text x="58" y="108" class="sub">本地配置模型提供方，Minecraft 执行层保持一致。</text>
  <g transform="translate(58 156)">
    <rect width="784" height="314" rx="8" fill="#121a16" stroke="#31473a"/>
    <g transform="translate(34 34)"><rect width="328" height="58" rx="8" fill="url(#green)"/><text x="24" y="38" class="tag">当前模型后端</text><text x="0" y="104" class="label">一个运行时。</text><text x="0" y="138" class="label">同一套执行控制。</text><text x="0" y="176" class="small">选定后端会驱动 /bw、Web、语音、</text><text x="0" y="200" class="small">Matrix、钉钉和本地脚本入口。</text></g>
    <g transform="translate(432 34)"><rect width="292" height="42" rx="8" fill="#1b2922" stroke="#405b4b"/><text x="22" y="28" class="label">Codex CLI</text><rect y="56" width="292" height="42" rx="8" fill="#1b2922" stroke="#405b4b"/><text x="22" y="84" class="label">OpenAI</text><rect y="112" width="292" height="42" rx="8" fill="#1b2922" stroke="#405b4b"/><text x="22" y="140" class="label">DeepSeek</text><rect y="168" width="292" height="42" rx="8" fill="#1b2922" stroke="#405b4b"/><text x="22" y="196" class="label">豆包 Doubao</text><rect y="224" width="292" height="42" rx="8" fill="#1b2922" stroke="#405b4b"/><text x="22" y="252" class="label">Gemini</text></g>
  </g>
  <g transform="translate(58 504)"><rect width="236" height="54" rx="8" fill="#17221d" stroke="#31473a"/><text x="24" y="35" class="small">本地凭证</text><rect x="274" width="236" height="54" rx="8" fill="#17221d" stroke="#31473a"/><text x="298" y="35" class="small">模型切换</text><rect x="548" width="236" height="54" rx="8" fill="#17221d" stroke="#31473a"/><text x="572" y="35" class="small">共享工具运行时</text></g>
</svg>
