<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Blockwright execution path</title>
  <desc id="desc">A product visual showing request intake, AI planning, controller tools, Minecraft execution, and verification reports.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09110d"/>
      <stop offset="1" stop-color="#111a16"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4fdb8f"/>
      <stop offset="1" stop-color="#20ad66"/>
    </linearGradient>
    <style>
      .label{font:800 21px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f3f6f0;letter-spacing:0}
      .small{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#b8c8bd;letter-spacing:0}
      .tiny{font:800 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#101411;letter-spacing:0}
      .title{font:900 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbf6;letter-spacing:0}
      .sub{font:650 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#b8c8bd;letter-spacing:0}
      .mono{font:800 17px "SFMono-Regular",Consolas,monospace;fill:#dce9df;letter-spacing:0}
    </style>
  </defs>
  <rect width="1200" height="520" rx="8" fill="url(#bg)"/>
  <g opacity="0.24" stroke="#2f493a" stroke-width="1">
    <path d="M80 96H1120M80 172H1120M80 248H1120M80 324H1120M80 400H1120"/>
    <path d="M180 64V456M340 64V456M500 64V456M660 64V456M820 64V456M980 64V456"/>
  </g>
  <text x="64" y="74" class="title">Execution with records and verification</text>
  <text x="64" y="108" class="sub">Natural language becomes typed tools, server-side world actions, and auditable reports.</text>

  <g transform="translate(64 166)">
    <rect width="164" height="116" rx="8" fill="#151f1a" stroke="#31473a"/>
    <rect x="18" y="18" width="64" height="26" rx="6" fill="#25342b"/>
    <text x="30" y="37" class="mono">/bw</text>
    <text x="18" y="72" class="label">Request</text>
    <text x="18" y="96" class="small">Web, voice, chat tools</text>
  </g>

  <g transform="translate(272 166)">
    <rect width="164" height="116" rx="8" fill="#151f1a" stroke="#31473a"/>
    <circle cx="46" cy="42" r="20" fill="url(#green)"/>
    <text x="78" y="47" class="label">AI plan</text>
    <text x="18" y="82" class="small">5 model backends</text>
    <text x="18" y="103" class="small">tool selection</text>
  </g>

  <g transform="translate(480 166)">
    <rect width="164" height="116" rx="8" fill="#151f1a" stroke="#31473a"/>
    <rect x="18" y="22" width="128" height="20" rx="5" fill="#263a30"/>
    <rect x="18" y="52" width="96" height="20" rx="5" fill="#263a30"/>
    <rect x="18" y="82" width="112" height="20" rx="5" fill="#263a30"/>
    <text x="18" y="108" class="label">Controller</text>
  </g>

  <g transform="translate(688 166)">
    <rect width="164" height="116" rx="8" fill="#151f1a" stroke="#31473a"/>
    <rect x="22" y="22" width="120" height="72" rx="8" fill="#1a2a22" stroke="#40c979"/>
    <text x="42" y="54" class="label">Fabric</text>
    <text x="36" y="82" class="small">world API</text>
  </g>

  <g transform="translate(896 166)">
    <rect width="164" height="116" rx="8" fill="#151f1a" stroke="#31473a"/>
    <g transform="translate(26 22)" fill="#284634" stroke="#55d98d">
      <path d="M44 0 88 24 44 48 0 24Z"/>
      <path d="M0 24v48l44 24V48Z"/>
      <path d="M88 24v48L44 96V48Z"/>
    </g>
    <text x="30" y="102" class="label">Minecraft</text>
  </g>

  <g stroke="#4fdb8f" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M232 224H268"/>
    <path d="M440 224H476"/>
    <path d="M648 224H684"/>
    <path d="M856 224H892"/>
  </g>
  <g fill="#4fdb8f">
    <path d="M268 224l-12-7v14Z"/>
    <path d="M476 224l-12-7v14Z"/>
    <path d="M684 224l-12-7v14Z"/>
    <path d="M892 224l-12-7v14Z"/>
  </g>

  <g transform="translate(94 344)">
    <rect width="300" height="84" rx="8" fill="#111815" stroke="#31473a"/>
    <rect x="22" y="20" width="92" height="26" rx="6" fill="#e7b15d"/>
    <text x="39" y="38" class="tiny">SAVED</text>
    <text x="132" y="38" class="label">Build record</text>
    <text x="22" y="64" class="small">Plan stored before execution.</text>
  </g>
  <g transform="translate(450 344)">
    <rect width="300" height="84" rx="8" fill="#111815" stroke="#31473a"/>
    <rect x="22" y="20" width="96" height="26" rx="6" fill="url(#green)"/>
    <text x="39" y="38" class="tiny">ACTION</text>
    <text x="136" y="38" class="label">World API actions</text>
    <text x="22" y="64" class="small">Blocks, inventory, time, weather, commands.</text>
  </g>
  <g transform="translate(806 344)">
    <rect width="300" height="84" rx="8" fill="#111815" stroke="#31473a"/>
    <rect x="22" y="20" width="98" height="26" rx="6" fill="#71a7ff"/>
    <text x="39" y="38" class="tiny">REPORT</text>
    <text x="138" y="38" class="label">Verification</text>
    <text x="22" y="64" class="small">Readback confirms the visible result.</text>
  </g>
</svg>
