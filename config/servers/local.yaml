server:
  name: local
  environment: local
  app_name: blockwright-controller
  host: 0.0.0.0
  port: 8765

storage:
  data_dir: data

minecraft:
  default_server_id: hmcl-lan

security:
  shared_token: local-dev-token
  require_token: false

codex:
  enabled: true
  command: "codex -m gpt-5.5 -c model_reasoning_effort=medium --skip-git-repo-check"
  timeout_seconds: 1800

llm:
  config_path: config/llm.local.yaml
  env_path: .env

chat:
  config_path: config/chat.local.yaml
  env_path: .env
