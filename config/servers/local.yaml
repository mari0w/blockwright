server:
  name: local
  environment: local
  app_name: blockwright-controller
  host: 127.0.0.1
  port: 8765

storage:
  data_dir: data

minecraft:
  default_server_id: hmcl-lan

security:
  shared_token: local-dev-token
  require_token: false

codex:
  enabled: true
  command: "codex --ignore-user-config -m gpt-5.5"
  timeout_seconds: 120

chat:
  config_path: config/chat.local.yaml
