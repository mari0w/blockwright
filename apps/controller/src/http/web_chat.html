<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blockwright</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --side: #15191d;
      --panel: #1b2025;
      --panel-soft: #22282e;
      --line: #303941;
      --text: #edf4ef;
      --muted: #9aa8a2;
      --accent: #68d391;
      --accent-strong: #39b86f;
      --accent-warm: #e8b15a;
      --focus: #7bb7ff;
      --danger: #ff6b6b;
      --shadow: 0 18px 46px rgba(0, 0, 0, .28);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 100vh;
    }
    aside {
      border-right: 1px solid var(--line);
      padding: 24px;
      background: var(--side);
    }
    main {
      display: grid;
      grid-template-rows: 1fr auto;
      min-width: 0;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 23px;
      font-weight: 650;
      letter-spacing: 0;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      color: var(--muted);
      font-size: 13px;
    }
    input, textarea, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }
    input, textarea, select {
      padding: 10px 12px;
      outline: none;
    }
    select {
      appearance: none;
      background:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%) calc(100% - 17px) 50% / 6px 6px no-repeat,
        linear-gradient(135deg, var(--muted) 50%, transparent 50%) calc(100% - 12px) 50% / 6px 6px no-repeat,
        var(--panel);
      padding-right: 30px;
    }
    textarea {
      min-height: 52px;
      max-height: 220px;
      resize: none;
      border: 0;
      background: transparent;
      padding: 13px 14px;
    }
    input:focus,
    select:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(123, 183, 255, .14);
    }
    button {
      padding: 11px 14px;
      border-color: var(--accent-strong);
      background: var(--accent-strong);
      color: #06100a;
      font-weight: 650;
      cursor: pointer;
    }
    button:disabled {
      cursor: wait;
      opacity: .65;
    }
    .messages {
      overflow: auto;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .02), transparent 180px),
        var(--bg);
    }
    .message {
      max-width: 900px;
      margin: 0 0 16px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 28px rgba(0, 0, 0, .16);
    }
    .message.user {
      margin-left: auto;
      border-color: rgba(104, 211, 145, .35);
      background: #17251d;
    }
    .message.pending {
      border-color: rgba(232, 177, 90, .42);
    }
    .message.error {
      border-color: rgba(255, 107, 107, .58);
    }
    .meta {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .message-body {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .message-body:empty {
      display: none;
    }
    .message-progress {
      margin-top: 10px;
      padding-top: 9px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    .message-progress.error {
      color: var(--danger);
    }
    .message-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      gap: 8px;
      margin-top: 10px;
      max-width: 520px;
    }
    .message-images img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0b0d0f;
    }
    .composer {
      border-top: 1px solid var(--line);
      padding: 16px 22px 18px;
      background: rgba(21, 25, 29, .96);
      backdrop-filter: blur(10px);
    }
    .input-shell {
      display: grid;
      grid-template-rows: auto auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .input-shell:focus-within {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(123, 183, 255, .14), var(--shadow);
    }
    .composer-actions {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr) 118px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-top: 1px solid var(--line);
      background: rgba(0, 0, 0, .12);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--text);
      font-size: 23px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
    }
    .icon-button:hover,
    .icon-button:focus-visible {
      border-color: var(--accent-warm);
      outline: none;
    }
    .icon-button svg {
      width: 21px;
      height: 21px;
      stroke: currentColor;
    }
    .voice-toggle.active {
      border-color: var(--accent);
      color: var(--accent);
    }
    .voice-panel {
      display: grid;
      grid-template-columns: 132px 146px minmax(180px, 1fr);
      gap: 10px;
      align-items: end;
      padding: 10px;
      border-top: 1px solid var(--line);
      background: rgba(0, 0, 0, .08);
    }
    .voice-panel[hidden] {
      display: none;
    }
    .voice-field {
      display: grid;
      gap: 5px;
      min-width: 0;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }
    .voice-field span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .voice-field select {
      height: 42px;
    }
    .voice-hold {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 42px;
      padding: 0 14px;
      border-color: var(--line);
      background: var(--panel-soft);
      color: var(--text);
      touch-action: none;
      user-select: none;
    }
    .voice-hold:hover,
    .voice-hold:focus-visible {
      border-color: var(--accent-warm);
      outline: none;
    }
    .voice-hold.recording {
      border-color: var(--danger);
      background: rgba(255, 107, 107, .16);
      color: #ffdede;
    }
    .voice-hold svg {
      width: 19px;
      height: 19px;
      flex: 0 0 auto;
      stroke: currentColor;
    }
    .preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
      gap: 8px;
      padding: 0 10px 10px;
    }
    .preview[hidden] {
      display: none;
    }
    .preview-item {
      position: relative;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      overflow: hidden;
    }
    .preview-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: #0b0d0f;
    }
    .remove-image {
      position: absolute;
      top: 6px;
      right: 6px;
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      padding: 0;
      border-color: rgba(255, 255, 255, .18);
      border-radius: 6px;
      background: rgba(0, 0, 0, .64);
      color: var(--text);
      font-size: 18px;
      line-height: 1;
    }
    .remove-image:hover,
    .remove-image:focus-visible {
      border-color: var(--danger);
      outline: none;
    }
    .preview-name {
      padding: 6px 7px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status.error {
      color: var(--danger);
    }
    @media (max-width: 760px) {
      .app {
        grid-template-columns: 1fr;
      }
      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .composer-actions {
        grid-template-columns: auto auto minmax(0, 1fr) 96px;
      }
      .voice-panel {
        grid-template-columns: 1fr 1fr;
      }
      .voice-hold {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>Blockwright</h1>
      <label for="username">用户名</label>
      <input id="username" autocomplete="username" placeholder="Charles">
      <label for="targetPlayer">Minecraft 玩家</label>
      <input id="targetPlayer" placeholder="默认同用户名">
      <label for="serverId">服务器</label>
      <input id="serverId" placeholder="hmcl-lan">
    </aside>
    <main>
      <section id="messages" class="messages" aria-live="polite"></section>
      <form id="form" class="composer">
        <div class="input-shell">
          <textarea id="text" placeholder="说你想建什么、改什么，图片会一起发过去。"></textarea>
          <div id="preview" class="preview" hidden></div>
          <div id="voicePanel" class="voice-panel" hidden>
            <label class="voice-field" for="voiceSource">
              <span>识别语言</span>
              <select id="voiceSource">
                <option value="zh-CN">中文</option>
                <option value="en-US">English</option>
                <option value="pt-BR">Português</option>
                <option value="hi-IN">Hindi</option>
                <option value="es-ES">Español</option>
              </select>
            </label>
            <label class="voice-field" for="voiceTarget">
              <span>翻译为</span>
              <select id="voiceTarget">
                <option value="zh-CN">中文</option>
                <option value="en">English</option>
                <option value="pt-BR">Português</option>
                <option value="hi-IN">Hindi</option>
                <option value="es">Español</option>
                <option value="original">不翻译</option>
              </select>
            </label>
            <button id="voiceHold" class="voice-hold" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
                <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <path d="M12 19v3"></path>
              </svg>
              <span id="voiceHoldText">按住说话，松手发送</span>
            </button>
          </div>
          <div class="composer-actions">
            <input id="images" class="sr-only" type="file" accept="image/*" multiple>
            <label class="icon-button" for="images" title="选择图片" aria-label="选择图片">+</label>
            <button id="voiceToggle" class="icon-button voice-toggle" type="button" title="语音输入" aria-label="语音输入">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
                <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <path d="M12 19v3"></path>
              </svg>
            </button>
            <div id="status" class="status"></div>
            <button id="send" type="submit">发送</button>
          </div>
        </div>
      </form>
    </main>
  </div>
  <script>
    const MAX_IMAGES = 4;
    const username = document.getElementById('username');
    const targetPlayer = document.getElementById('targetPlayer');
    const serverId = document.getElementById('serverId');
    const images = document.getElementById('images');
    const preview = document.getElementById('preview');
    const form = document.getElementById('form');
    const text = document.getElementById('text');
    const messages = document.getElementById('messages');
    const statusEl = document.getElementById('status');
    const send = document.getElementById('send');
    const voiceToggle = document.getElementById('voiceToggle');
    const voicePanel = document.getElementById('voicePanel');
    const voiceSource = document.getElementById('voiceSource');
    const voiceTarget = document.getElementById('voiceTarget');
    const voiceHold = document.getElementById('voiceHold');
    const voiceHoldText = document.getElementById('voiceHoldText');
    const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
    let pendingImages = [];
    let nextImageId = 1;
    let activeJobPoll = null;
    let recognition = null;
    let voiceHoldActive = false;
    let voiceStopping = false;
    let voiceSending = false;
    let voiceFinalText = '';
    let voiceInterimText = '';

    username.value = localStorage.getItem('bw.username') || '';
    targetPlayer.value = localStorage.getItem('bw.targetPlayer') || '';
    serverId.value = localStorage.getItem('bw.serverId') || 'hmcl-lan';
    voiceSource.value = localStorage.getItem('bw.voiceSource') || 'zh-CN';
    voiceTarget.value = localStorage.getItem('bw.voiceTarget') || 'zh-CN';

    [username, targetPlayer, serverId].forEach((input) => {
      input.addEventListener('input', () => localStorage.setItem(`bw.${input.id}`, input.value));
    });
    voiceSource.addEventListener('change', () => localStorage.setItem('bw.voiceSource', voiceSource.value));
    voiceTarget.addEventListener('change', () => localStorage.setItem('bw.voiceTarget', voiceTarget.value));
    setVoicePanel(localStorage.getItem('bw.voiceEnabled') === '1');

    if (!SpeechRecognitionCtor) {
      voiceHold.disabled = true;
      voiceHoldText.textContent = '当前浏览器不支持语音识别';
    }

    images.addEventListener('change', () => {
      addImageFiles([...images.files]);
      images.value = '';
    });

    form.addEventListener('paste', (event) => {
      const pastedImages = clipboardImages(event.clipboardData);
      if (pastedImages.length > 0) {
        addImageFiles(pastedImages);
      }
    });

    text.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey && !event.isComposing) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    text.addEventListener('input', resizeComposer);
    resizeComposer();

    voiceToggle.addEventListener('click', () => {
      const enabled = voicePanel.hidden;
      setVoicePanel(enabled);
      if (enabled && !SpeechRecognitionCtor) {
        setStatus('当前浏览器不支持语音识别，建议用 Chrome 打开。', true);
      }
    });

    voiceHold.addEventListener('pointerdown', startVoiceInput);
    voiceHold.addEventListener('pointerup', stopVoiceInput);
    voiceHold.addEventListener('pointercancel', cancelVoiceInput);
    voiceHold.addEventListener('contextmenu', (event) => event.preventDefault());
    voiceHold.addEventListener('keydown', (event) => {
      if ((event.key === ' ' || event.key === 'Enter') && !voiceHoldActive) {
        event.preventDefault();
        startVoiceInput(event);
      }
    });
    voiceHold.addEventListener('keyup', (event) => {
      if (event.key === ' ' || event.key === 'Enter') {
        event.preventDefault();
        stopVoiceInput(event);
      }
    });

    function addImageFiles(files) {
      const imageFiles = files.filter((file) => file && file.type.startsWith('image/'));
      if (imageFiles.length === 0) {
        return;
      }
      const available = MAX_IMAGES - pendingImages.length;
      if (available <= 0) {
        setStatus(`一次最多发送 ${MAX_IMAGES} 张图片。`, true);
        return;
      }
      const selected = imageFiles.slice(0, available);
      selected.forEach((file) => {
        pendingImages.push({
          id: nextImageId++,
          file,
          url: URL.createObjectURL(file)
        });
      });
      renderPreview();
      if (imageFiles.length > selected.length) {
        setStatus(`已添加 ${selected.length} 张图片，最多保留 ${MAX_IMAGES} 张。`, true);
      } else {
        setStatus(`已添加 ${selected.length} 张图片。`, false);
      }
    }

    function clipboardImages(data) {
      if (!data) {
        return [];
      }
      const byKey = new Map();
      const addFile = (file) => {
        if (!file || !file.type.startsWith('image/')) {
          return;
        }
        const key = `${file.name}:${file.size}:${file.type}:${file.lastModified}`;
        byKey.set(key, file);
      };
      [...data.files].forEach(addFile);
      [...data.items].forEach((item) => {
        if (item.kind === 'file' && item.type.startsWith('image/')) {
          addFile(item.getAsFile());
        }
      });
      return [...byKey.values()];
    }

    function renderPreview() {
      preview.replaceChildren();
      preview.hidden = pendingImages.length === 0;
      pendingImages.forEach((entry) => {
        const item = document.createElement('div');
        item.className = 'preview-item';
        const img = document.createElement('img');
        img.src = entry.url;
        img.alt = entry.file.name || '参考图片';
        const remove = document.createElement('button');
        remove.type = 'button';
        remove.className = 'remove-image';
        remove.textContent = '×';
        remove.title = '移除图片';
        remove.setAttribute('aria-label', `移除 ${entry.file.name || '图片'}`);
        remove.addEventListener('click', () => removeImage(entry.id));
        const name = document.createElement('div');
        name.className = 'preview-name';
        name.textContent = entry.file.name || '粘贴图片';
        item.append(img, remove, name);
        preview.appendChild(item);
      });
    }

    function removeImage(id) {
      const kept = [];
      pendingImages.forEach((entry) => {
        if (entry.id === id) {
          URL.revokeObjectURL(entry.url);
        } else {
          kept.push(entry);
        }
      });
      pendingImages = kept;
      renderPreview();
    }

    function clearComposer() {
      text.value = '';
      images.value = '';
      pendingImages.forEach((entry) => URL.revokeObjectURL(entry.url));
      pendingImages = [];
      renderPreview();
      resizeComposer();
    }

    function resizeComposer() {
      text.style.height = 'auto';
      text.style.height = `${Math.min(text.scrollHeight, 220)}px`;
    }

    function setVoicePanel(enabled) {
      voicePanel.hidden = !enabled;
      voiceToggle.classList.toggle('active', enabled);
      voiceToggle.setAttribute('aria-pressed', String(enabled));
      localStorage.setItem('bw.voiceEnabled', enabled ? '1' : '0');
    }

    function startVoiceInput(event) {
      if (!SpeechRecognitionCtor) {
        setStatus('当前浏览器不支持语音识别，建议用 Chrome 打开。', true);
        return;
      }
      if (send.disabled || voiceSending || voiceHoldActive) {
        return;
      }
      event?.preventDefault?.();
      if (event?.pointerId != null && voiceHold.setPointerCapture) {
        voiceHold.setPointerCapture(event.pointerId);
      }

      voiceFinalText = '';
      voiceInterimText = '';
      voiceStopping = false;
      voiceHoldActive = true;
      recognition = new SpeechRecognitionCtor();
      recognition.lang = voiceSource.value;
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.onresult = handleVoiceResult;
      recognition.onerror = (error) => {
        const message = voiceErrorMessage(error.error);
        setStatus(message, true);
      };
      recognition.onend = () => {
        recognition = null;
        voiceHold.classList.remove('recording');
        voiceHoldText.textContent = '按住说话，松手发送';
        if (voiceStopping) {
          finishVoiceInput();
        }
      };

      try {
        recognition.start();
        voiceHold.classList.add('recording');
        voiceHoldText.textContent = '松手发送';
        setStatus('正在听，松手后会翻译并发送。', false);
      } catch (error) {
        recognition = null;
        voiceHoldActive = false;
        voiceHold.classList.remove('recording');
        setStatus(error.message || '语音识别启动失败。', true);
      }
    }

    function handleVoiceResult(event) {
      let interim = '';
      for (let index = event.resultIndex; index < event.results.length; index += 1) {
        const result = event.results[index];
        const transcript = result[0]?.transcript || '';
        if (result.isFinal) {
          voiceFinalText += transcript;
        } else {
          interim += transcript;
        }
      }
      voiceInterimText = interim || voiceInterimText;
      const previewText = `${voiceFinalText}${voiceInterimText}`.trim();
      if (previewText) {
        setStatus(`已听到：${shortText(previewText, 56)}`, false);
      }
    }

    function stopVoiceInput(event) {
      if (!voiceHoldActive) {
        return;
      }
      event?.preventDefault?.();
      if (event?.pointerId != null && voiceHold.releasePointerCapture) {
        try {
          voiceHold.releasePointerCapture(event.pointerId);
        } catch (_) {
        }
      }
      voiceHoldActive = false;
      voiceStopping = true;
      if (recognition) {
        recognition.stop();
      } else {
        finishVoiceInput();
      }
    }

    function cancelVoiceInput(event) {
      event?.preventDefault?.();
      voiceHoldActive = false;
      voiceStopping = false;
      if (recognition) {
        recognition.abort();
      }
      recognition = null;
      voiceHold.classList.remove('recording');
      voiceHoldText.textContent = '按住说话，松手发送';
      setStatus('语音输入已取消。', false);
    }

    async function finishVoiceInput() {
      if (voiceSending) {
        return;
      }
      const spokenText = `${voiceFinalText}${voiceInterimText}`.trim();
      voiceFinalText = '';
      voiceInterimText = '';
      voiceStopping = false;
      if (!spokenText) {
        setStatus('没有听清内容，按住再说一次。', true);
        return;
      }

      voiceSending = true;
      voiceHold.disabled = true;
      try {
        const translated = await translateVoiceText(spokenText);
        text.value = translated;
        resizeComposer();
        await sendCurrentMessage();
      } catch (error) {
        text.value = spokenText;
        resizeComposer();
        setStatus(`${error.message || String(error)}，已保留识别文字。`, true);
      } finally {
        voiceSending = false;
        voiceHold.disabled = !SpeechRecognitionCtor;
      }
    }

    async function translateVoiceText(spokenText) {
      const target = voiceTarget.value;
      if (target === 'original') {
        setStatus('已按语音原文发送。', false);
        return spokenText;
      }

      const targetLabel = voiceTarget.options[voiceTarget.selectedIndex]?.textContent || '目标语言';
      setStatus(`正在翻译为${targetLabel}...`, false);
      const response = await fetch('/web/translate', {
        method: 'POST',
        headers: {'content-type': 'application/json'},
        body: JSON.stringify({
          text: spokenText,
          target_language: target
        })
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.message || payload.error || await response.text() || '语音翻译失败');
      }
      const translated = (payload.translated_text || '').trim();
      if (!translated) {
        throw new Error('语音翻译结果为空');
      }
      return translated;
    }

    function voiceErrorMessage(code) {
      switch (code) {
        case 'not-allowed':
        case 'service-not-allowed':
          return '浏览器没有麦克风权限，允许后再试。';
        case 'no-speech':
          return '没有听到声音，按住再说一次。';
        case 'audio-capture':
          return '没有可用麦克风。';
        case 'network':
          return '语音识别服务暂时不可用。';
        default:
          return '语音识别失败。';
      }
    }

    function shortText(value, maxLength) {
      return value.length > maxLength ? `${value.slice(0, maxLength)}...` : value;
    }

    function sentImageSummary(count) {
      if (count === 0) {
        return '';
      }
      return count === 1 ? '发送了一张参考图片' : `发送了 ${count} 张参考图片`;
    }

    function messageTextForDisplay(value, imageCount) {
      const trimmed = value.trim();
      return trimmed || sentImageSummary(imageCount);
    }

    function imageDataUrls(uploads) {
      return uploads.map((upload) => upload.data_url).filter(Boolean);
    }

    function imageStatus(count) {
      if (count === 0) {
        return '';
      }
      return `，图片 ${count} 张`;
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      sendCurrentMessage();
    });

    async function sendCurrentMessage() {
      const name = username.value.trim();
      if (!name) {
        setStatus('先填用户名。', true);
        username.focus();
        return;
      }
      const voiceWasDisabled = voiceHold.disabled;
      send.disabled = true;
      voiceHold.disabled = true;
      stopJobPolling();
      setStatus('正在发送给 Blockwright...', false);
      let assistantMessage = null;
      let progressTimers = [];
      try {
        const currentText = text.value;
        const uploads = await Promise.all(pendingImages.map((entry) => readImage(entry.file)));
        const body = {
          username: name,
          target_player: targetPlayer.value.trim() || null,
          server_id: serverId.value.trim() || null,
          text: currentText,
          images: uploads
        };
        addMessage('user', name, messageTextForDisplay(currentText, uploads.length), imageDataUrls(uploads));
        assistantMessage = addMessage('assistant', 'Blockwright', '正在接收消息...', []);
        assistantMessage.classList.add('pending');
        progressTimers = startRequestProgress(assistantMessage, uploads.length);
        const response = await fetch('/web/message', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify(body)
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.message || payload.error || await response.text() || '请求失败');
        }
        stopTimers(progressTimers);
        assistantMessage.classList.remove('pending');
        updateMessageBody(assistantMessage, payload.reply || '');
        if (payload.queued_job_id) {
          const queuedText = `任务状态：已排队 ${payload.queued_job_id}${imageStatus(uploads.length)}`;
          setStatus(queuedText, false);
          setMessageProgress(assistantMessage, queuedText, false);
          startJobPolling(payload.queued_job_id, assistantMessage);
        } else {
          setStatus(`已回复${imageStatus(uploads.length)}`, false);
          clearMessageProgress(assistantMessage);
        }
        clearComposer();
      } catch (error) {
        stopTimers(progressTimers);
        const message = error.message || String(error);
        setStatus(message, true);
        if (assistantMessage) {
          assistantMessage.classList.remove('pending');
          assistantMessage.classList.add('error');
          updateMessageBody(assistantMessage, `处理失败：${message}`);
          clearMessageProgress(assistantMessage);
        }
      } finally {
        send.disabled = false;
        voiceHold.disabled = voiceWasDisabled || !SpeechRecognitionCtor;
      }
    }

    function addMessage(kind, who, content, imageUrls) {
      const item = document.createElement('article');
      item.className = `message ${kind}`;
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = who;
      const body = document.createElement('div');
      body.className = 'message-body';
      body.textContent = content;
      item.append(meta, body);
      if (imageUrls && imageUrls.length > 0) {
        const gallery = document.createElement('div');
        gallery.className = 'message-images';
        imageUrls.forEach((url) => {
          const img = document.createElement('img');
          img.src = url;
          img.alt = '已发送图片';
          gallery.appendChild(img);
        });
        item.appendChild(gallery);
      }
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
      return item;
    }

    function updateMessageBody(item, content) {
      const body = item.querySelector('.message-body');
      if (body) {
        body.textContent = content;
      }
      messages.scrollTop = messages.scrollHeight;
    }

    function setMessageProgress(item, content, isError) {
      let progress = item.querySelector('.message-progress');
      if (!progress) {
        progress = document.createElement('div');
        progress.className = 'message-progress';
        item.appendChild(progress);
      }
      progress.textContent = content;
      progress.classList.toggle('error', Boolean(isError));
      messages.scrollTop = messages.scrollHeight;
    }

    function clearMessageProgress(item) {
      item.querySelector('.message-progress')?.remove();
    }

    function setStatus(value, isError) {
      statusEl.textContent = value;
      statusEl.classList.toggle('error', Boolean(isError));
    }

    function startRequestProgress(item, imageCount) {
      const imageHint = imageCount > 0 ? '，同时整理参考图片' : '';
      const phases = [
        {delay: 0, text: `正在接收消息${imageHint}...`},
        {delay: 900, text: '正在识别这是建造、动作还是改造需求...'},
        {delay: 2400, text: 'Codex 正在规划方案和方块清单...'},
        {delay: 7000, text: '规划还在继续，可能正在结合场地或图片细节...'},
        {delay: 15000, text: '还在等 Codex 返回结构化方案，请稍等...'}
      ];
      return phases.map((phase) => setTimeout(() => {
        updateMessageBody(item, phase.text);
        setStatus(phase.text, false);
      }, phase.delay));
    }

    function stopTimers(timers) {
      timers.forEach((timer) => clearTimeout(timer));
    }

    function stopJobPolling() {
      if (activeJobPoll) {
        clearInterval(activeJobPoll);
        activeJobPoll = null;
      }
    }

    function startJobPolling(jobId, item) {
      stopJobPolling();
      let attempts = 0;
      const poll = async () => {
        attempts += 1;
        try {
          const response = await fetch(`/web/jobs/${encodeURIComponent(jobId)}/status`);
          if (!response.ok) {
            throw new Error('任务状态暂时不可用');
          }
          const payload = await response.json();
          const detail = payload.result_message ? `（${payload.result_message}）` : '';
          const message = `任务状态：${payload.message}${detail}`;
          const isError = payload.phase === 'failed';
          setStatus(message, isError);
          setMessageProgress(item, message, isError);
          if (payload.phase === 'succeeded' || payload.phase === 'failed') {
            stopJobPolling();
          }
        } catch (error) {
          if (attempts >= 3) {
            const message = error.message || String(error);
            setStatus(message, true);
            setMessageProgress(item, `任务状态：${message}`, true);
          }
        }
      };
      poll();
      activeJobPoll = setInterval(poll, 2000);
    }

    function readImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error(`${file.name} 读取失败`));
        reader.onload = () => resolve({
          file_name: file.name,
          mime_type: file.type || 'image/png',
          data_url: reader.result
        });
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
