<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Blockwright</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --side: #15191d;
      --panel: #1b2025;
      --panel-soft: #22282e;
      --line: #303941;
      --text: #edf4ef;
      --muted: #9aa8a2;
      --accent: #68d391;
      --accent-strong: #39b86f;
      --accent-warm: #e8b15a;
      --focus: #7bb7ff;
      --danger: #ff6b6b;
      --shadow: 0 18px 46px rgba(0, 0, 0, .28);
    }
    * {
      box-sizing: border-box;
    }
    html {
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 100vh;
      min-height: 100dvh;
      height: 100vh;
      height: 100dvh;
    }
    aside {
      border-right: 1px solid var(--line);
      padding: 24px;
      background: var(--side);
    }
    main {
      display: grid;
      grid-template-rows: 1fr auto;
      min-width: 0;
      min-height: 0;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 23px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .setup-field {
      display: block;
      margin: 14px 0 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .setup-field span {
      display: block;
      margin-bottom: 6px;
    }
    input, textarea, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }
    input, textarea, select {
      padding: 10px 12px;
      outline: none;
    }
    select {
      appearance: none;
      background:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%) calc(100% - 17px) 50% / 6px 6px no-repeat,
        linear-gradient(135deg, var(--muted) 50%, transparent 50%) calc(100% - 12px) 50% / 6px 6px no-repeat,
        var(--panel);
      padding-right: 30px;
    }
    textarea {
      min-height: 52px;
      max-height: 220px;
      resize: none;
      border: 0;
      background: transparent;
      padding: 13px 14px;
    }
    input:focus,
    select:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(123, 183, 255, .14);
    }
    button {
      padding: 11px 14px;
      border-color: var(--accent-strong);
      background: var(--accent-strong);
      color: #06100a;
      font-weight: 650;
      cursor: pointer;
    }
    button:disabled {
      cursor: wait;
      opacity: .65;
    }
    .messages {
      overflow: auto;
      min-height: 0;
      padding: 24px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .02), transparent 180px),
        var(--bg);
    }
    .message {
      max-width: 900px;
      margin: 0 0 16px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 28px rgba(0, 0, 0, .16);
    }
    .message.user {
      margin-left: auto;
      border-color: rgba(104, 211, 145, .35);
      background: #17251d;
    }
    .message.pending {
      border-color: rgba(232, 177, 90, .42);
    }
    .message.error {
      border-color: rgba(255, 107, 107, .58);
    }
    .meta {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .message-body {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .message-body:empty {
      display: none;
    }
    .message-progress {
      margin-top: 10px;
      padding-top: 9px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    .message-progress.error {
      color: var(--danger);
    }
    .message-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      gap: 8px;
      margin-top: 10px;
      max-width: 520px;
    }
    .message-images img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0b0d0f;
    }
    .composer {
      border-top: 1px solid var(--line);
      padding: 16px 22px calc(18px + env(safe-area-inset-bottom));
      background: rgba(21, 25, 29, .96);
      backdrop-filter: blur(10px);
    }
    .input-shell {
      display: grid;
      grid-template-rows: auto auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .input-shell:focus-within {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(123, 183, 255, .14), var(--shadow);
    }
    .input-shell.voice-mode:focus-within {
      border-color: var(--line);
      box-shadow: var(--shadow);
    }
    .composer-actions {
      display: grid;
      grid-template-columns: auto auto auto minmax(0, 1fr) 118px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-top: 1px solid var(--line);
      background: rgba(0, 0, 0, .12);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--text);
      font-size: 23px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
    }
    .icon-button:hover,
    .icon-button:focus-visible {
      border-color: var(--accent-warm);
      outline: none;
    }
    .icon-button svg {
      width: 21px;
      height: 21px;
      stroke: currentColor;
    }
    .voice-toggle.active {
      border-color: var(--accent);
      color: var(--accent);
    }
    .voice-panel {
      display: grid;
      gap: 10px;
      padding: 10px;
      background: transparent;
    }
    .voice-panel[hidden] {
      display: none;
    }
    .voice-hold {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 58px;
      padding: 0 16px;
      border-color: var(--line);
      background: var(--panel-soft);
      color: var(--text);
      font-size: 16px;
      touch-action: none;
      user-select: none;
    }
    .voice-hold:hover,
    .voice-hold:focus-visible {
      border-color: var(--accent-warm);
      outline: none;
    }
    .voice-hold.recording {
      border-color: var(--danger);
      background: rgba(255, 107, 107, .16);
      color: #ffdede;
    }
    .voice-hold.sending {
      border-color: var(--accent-warm);
      color: var(--accent-warm);
    }
    .voice-hold svg {
      width: 19px;
      height: 19px;
      flex: 0 0 auto;
      stroke: currentColor;
    }
    .voice-hold span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
      gap: 8px;
      padding: 0 10px 10px;
    }
    .preview[hidden] {
      display: none;
    }
    .preview-item {
      position: relative;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      overflow: hidden;
    }
    .preview-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: #0b0d0f;
    }
    .remove-image {
      position: absolute;
      top: 6px;
      right: 6px;
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      padding: 0;
      border-color: rgba(255, 255, 255, .18);
      border-radius: 6px;
      background: rgba(0, 0, 0, .64);
      color: var(--text);
      font-size: 18px;
      line-height: 1;
    }
    .remove-image:hover,
    .remove-image:focus-visible {
      border-color: var(--danger);
      outline: none;
    }
    .preview-name {
      padding: 6px 7px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status.error {
      color: var(--danger);
    }
    .secondary-button {
      border-color: var(--line);
      background: var(--panel-soft);
      color: var(--text);
    }
    aside > .secondary-button {
      margin-top: 14px;
    }
    .secondary-button:hover,
    .secondary-button:focus-visible {
      border-color: var(--accent-warm);
      outline: none;
    }
    .config-dialog {
      width: min(560px, calc(100vw - 28px));
      max-height: calc(100dvh - 28px);
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--side);
      color: var(--text);
      box-shadow: var(--shadow);
    }
    .config-dialog::backdrop {
      background: rgba(0, 0, 0, .52);
    }
    .config-form {
      display: grid;
      gap: 14px;
      padding: 20px;
    }
    .config-form h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .config-form label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .config-checkbox {
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      color: var(--text);
    }
    .config-checkbox input {
      width: auto;
      margin: 0;
    }
    .config-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .config-actions button {
      width: auto;
      min-width: 96px;
    }
    .config-status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .config-status.error {
      color: var(--danger);
    }
    #send[hidden] {
      display: none;
    }
    @media (max-width: 760px) {
      body {
        font-size: 14px;
      }
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
      }
      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      .settings-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 8px;
      }
      .setup-field {
        min-width: 0;
        margin: 0;
      }
      .setup-field span {
        margin-bottom: 4px;
        font-size: 12px;
      }
      input,
      textarea,
      select,
      button {
        font-size: 16px;
      }
      input,
      select {
        height: 40px;
        padding: 8px 10px;
      }
      .messages {
        padding: 12px 10px;
      }
      .message {
        max-width: 94%;
        margin-bottom: 10px;
        padding: 11px 12px;
      }
      .message.user {
        max-width: 88%;
      }
      .message-images {
        grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
        max-width: 100%;
      }
      .composer {
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
      }
      .input-shell {
        border-radius: 8px;
      }
      textarea {
        min-height: 48px;
        max-height: 34dvh;
        padding: 11px;
      }
      .composer-actions {
        grid-template-columns: 50px 50px 50px minmax(88px, 1fr);
        gap: 8px;
        padding: 8px;
      }
      .icon-button {
        width: 50px;
        height: 50px;
      }
      #send {
        grid-column: 4;
        grid-row: 1;
        min-height: 50px;
      }
      .status {
        grid-column: 1 / -1;
        grid-row: 2;
        min-height: 18px;
        line-height: 1.35;
        white-space: normal;
      }
      .voice-panel {
        gap: 8px;
        padding: 8px;
      }
      .voice-hold {
        height: 54px;
      }
      .preview {
        grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
        padding: 0 8px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>Blockwright</h1>
      <div class="settings-grid">
        <label class="setup-field" for="username">
          <span>Minecraft 用户名</span>
          <input id="username" autocomplete="username" placeholder="Charles">
        </label>
      </div>
      <button id="configOpen" class="secondary-button" type="button">Web 配置</button>
    </aside>
    <main>
      <section id="messages" class="messages" aria-live="polite"></section>
      <form id="form" class="composer">
        <div class="input-shell">
          <textarea id="text" placeholder="说你想建什么、改什么，图片会一起发过去。"></textarea>
          <div id="preview" class="preview" hidden></div>
          <div id="voicePanel" class="voice-panel" hidden>
            <button id="voiceHold" class="voice-hold" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
                <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <path d="M12 19v3"></path>
              </svg>
              <span id="voiceHoldText">按住说话，松手发送</span>
            </button>
          </div>
          <div class="composer-actions">
            <input id="cameraImage" class="sr-only" type="file" accept="image/*" capture="environment">
            <label class="icon-button" for="cameraImage" title="拍照" aria-label="拍照">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
                <path d="M14.5 4 16 7h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h3l1.5-3h5Z"></path>
                <circle cx="12" cy="13" r="3"></circle>
              </svg>
            </label>
            <input id="libraryImages" class="sr-only" type="file" accept="image/*" multiple>
            <label class="icon-button" for="libraryImages" title="从相册选择" aria-label="从相册选择">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <path d="m8 13 2.5-2.5L15 15l1.5-1.5L21 18"></path>
                <circle cx="8" cy="9" r="1.5"></circle>
              </svg>
            </label>
            <button id="voiceToggle" class="icon-button voice-toggle" type="button" title="语音输入" aria-label="语音输入">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
                <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <path d="M12 19v3"></path>
              </svg>
            </button>
            <div id="status" class="status"></div>
            <button id="send" type="submit">发送</button>
          </div>
        </div>
      </form>
    </main>
  </div>
  <dialog id="configDialog" class="config-dialog">
    <form id="configForm" class="config-form">
      <h2>Web 配置</h2>
      <label for="controllerToken">
        <span>Controller Token</span>
        <input id="controllerToken" type="password" autocomplete="off" placeholder="local-dev-token">
      </label>
      <label class="config-checkbox" for="matrixEnabled">
        <input id="matrixEnabled" type="checkbox" checked>
        <span>启用 Element/Matrix</span>
      </label>
      <label for="matrixHomeserver">
        <span>Matrix 主服务器 URL</span>
        <input id="matrixHomeserver" placeholder="https://matrix-client.matrix.org">
      </label>
      <label for="matrixAccessToken">
        <span>Matrix Access Token</span>
        <input id="matrixAccessToken" type="password" autocomplete="off" placeholder="留空表示保留已有 token">
      </label>
      <label for="matrixAllowedSender">
        <span>允许发指令的 Matrix 用户</span>
        <input id="matrixAllowedSender" placeholder="@user:matrix.org">
      </label>
      <label class="config-checkbox" for="matrixAllowOwn">
        <input id="matrixAllowOwn" type="checkbox" checked>
        <span>个人 token 允许处理自己发出的消息</span>
      </label>
      <label class="config-checkbox" for="matrixAutoJoin">
        <input id="matrixAutoJoin" type="checkbox" checked>
        <span>自动加入邀请房间</span>
      </label>
      <div id="configStatus" class="config-status"></div>
      <div class="config-actions">
        <button id="configSave" type="submit">保存配置</button>
        <button id="configClose" class="secondary-button" type="button">关闭</button>
      </div>
    </form>
  </dialog>
  <script>
    const MAX_IMAGES = 4;
    const username = document.getElementById('username');
    const configOpen = document.getElementById('configOpen');
    const configDialog = document.getElementById('configDialog');
    const configForm = document.getElementById('configForm');
    const configClose = document.getElementById('configClose');
    const configStatus = document.getElementById('configStatus');
    const configSave = document.getElementById('configSave');
    const controllerToken = document.getElementById('controllerToken');
    const matrixEnabled = document.getElementById('matrixEnabled');
    const matrixHomeserver = document.getElementById('matrixHomeserver');
    const matrixAccessToken = document.getElementById('matrixAccessToken');
    const matrixAllowedSender = document.getElementById('matrixAllowedSender');
    const matrixAllowOwn = document.getElementById('matrixAllowOwn');
    const matrixAutoJoin = document.getElementById('matrixAutoJoin');
    const cameraImage = document.getElementById('cameraImage');
    const libraryImages = document.getElementById('libraryImages');
    const preview = document.getElementById('preview');
    const form = document.getElementById('form');
    const inputShell = document.querySelector('.input-shell');
    const text = document.getElementById('text');
    const messages = document.getElementById('messages');
    const statusEl = document.getElementById('status');
    const send = document.getElementById('send');
    const voiceToggle = document.getElementById('voiceToggle');
    const voicePanel = document.getElementById('voicePanel');
    const voiceHold = document.getElementById('voiceHold');
    const voiceHoldText = document.getElementById('voiceHoldText');
    const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
    const voiceUnavailable = voiceUnavailableMessage();
    let pendingImages = [];
    let nextImageId = 1;
    let activeJobPoll = null;
    let recognition = null;
    let voiceHoldActive = false;
    let voiceStopping = false;
    let voiceSending = false;
    let voiceHadError = false;
    let voiceFinalText = '';
    let voiceInterimText = '';

    username.value = localStorage.getItem('bw.username') || '';
    controllerToken.value = localStorage.getItem('bw.controllerToken') || 'local-dev-token';
    matrixHomeserver.value = localStorage.getItem('bw.matrixHomeserver') || 'https://matrix-client.matrix.org';
    matrixAllowedSender.value = localStorage.getItem('bw.matrixAllowedSender') || '';
    matrixEnabled.checked = localStorage.getItem('bw.matrixEnabled') !== '0';
    matrixAllowOwn.checked = localStorage.getItem('bw.matrixAllowOwn') !== '0';
    matrixAutoJoin.checked = localStorage.getItem('bw.matrixAutoJoin') !== '0';

    [username].forEach((input) => {
      input.addEventListener('input', () => localStorage.setItem(`bw.${input.id}`, input.value));
    });
    [
      [controllerToken, 'bw.controllerToken'],
      [matrixHomeserver, 'bw.matrixHomeserver'],
      [matrixAllowedSender, 'bw.matrixAllowedSender']
    ].forEach(([input, key]) => {
      input.addEventListener('input', () => localStorage.setItem(key, input.value));
    });
    [
      [matrixEnabled, 'bw.matrixEnabled'],
      [matrixAllowOwn, 'bw.matrixAllowOwn'],
      [matrixAutoJoin, 'bw.matrixAutoJoin']
    ].forEach(([input, key]) => {
      input.addEventListener('change', () => localStorage.setItem(key, input.checked ? '1' : '0'));
    });
    setVoicePanel(!voiceUnavailable && localStorage.getItem('bw.voiceEnabled') === '1');

    if (voiceUnavailable) {
      voiceHold.disabled = true;
      voiceHoldText.textContent = voiceUnavailable;
    }

    cameraImage.addEventListener('change', () => {
      addImageFiles([...cameraImage.files], 'camera');
      cameraImage.value = '';
    });

    libraryImages.addEventListener('change', () => {
      addImageFiles([...libraryImages.files], 'library');
      libraryImages.value = '';
    });

    form.addEventListener('paste', (event) => {
      const pastedImages = clipboardImages(event.clipboardData);
      if (pastedImages.length > 0) {
        addImageFiles(pastedImages);
      }
    });

    configOpen.addEventListener('click', () => {
      clearConfigStatus();
      if (typeof configDialog.showModal === 'function') {
        configDialog.showModal();
      } else {
        configDialog.setAttribute('open', '');
      }
    });

    configClose.addEventListener('click', closeConfigDialog);
    configForm.addEventListener('submit', saveWebConfig);

    text.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey && !event.isComposing) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    text.addEventListener('input', resizeComposer);
    resizeComposer();

    voiceToggle.addEventListener('click', () => {
      const enabled = voicePanel.hidden;
      if (enabled && voiceUnavailable) {
        setStatus(voiceUnavailable, true);
        setVoicePanel(false);
        return;
      }
      setVoicePanel(enabled);
    });

    voiceHold.addEventListener('pointerdown', startVoiceInput);
    voiceHold.addEventListener('pointerup', stopVoiceInput);
    voiceHold.addEventListener('pointercancel', cancelVoiceInput);
    voiceHold.addEventListener('contextmenu', (event) => event.preventDefault());
    voiceHold.addEventListener('keydown', (event) => {
      if ((event.key === ' ' || event.key === 'Enter') && !voiceHoldActive) {
        event.preventDefault();
        startVoiceInput(event);
      }
    });
    voiceHold.addEventListener('keyup', (event) => {
      if (event.key === ' ' || event.key === 'Enter') {
        event.preventDefault();
        stopVoiceInput(event);
      }
    });

    function addImageFiles(files, source = 'upload') {
      const imageFiles = files.filter(isImageFile);
      if (imageFiles.length === 0) {
        return;
      }
      const available = MAX_IMAGES - pendingImages.length;
      if (available <= 0) {
        setStatus(`一次最多发送 ${MAX_IMAGES} 张图片。`, true);
        return;
      }
      const selected = imageFiles.slice(0, available);
      selected.forEach((file) => {
        pendingImages.push({
          id: nextImageId++,
          file,
          url: URL.createObjectURL(file)
        });
      });
      renderPreview();
      if (imageFiles.length > selected.length) {
        setStatus(`已添加 ${selected.length} 张图片，最多保留 ${MAX_IMAGES} 张。`, true);
      } else {
        setStatus(imageAddedMessage(selected.length, source), false);
      }
    }

    function imageAddedMessage(count, source) {
      if (source === 'camera') {
        return count === 1 ? '已添加拍摄照片。' : `已添加 ${count} 张拍摄照片。`;
      }
      if (source === 'library') {
        return count === 1 ? '已从相册添加 1 张图片。' : `已从相册添加 ${count} 张图片。`;
      }
      return `已添加 ${count} 张图片。`;
    }

    function isImageFile(file) {
      if (!file) {
        return false;
      }
      if (file.type && file.type.startsWith('image/')) {
        return true;
      }
      return /\.(png|jpe?g|webp|gif|heic|heif)$/i.test(file.name || '');
    }

    function imageMimeType(file) {
      if (file.type && file.type.startsWith('image/')) {
        return file.type;
      }
      const lower = (file.name || '').toLowerCase();
      if (lower.endsWith('.jpg') || lower.endsWith('.jpeg')) {
        return 'image/jpeg';
      }
      if (lower.endsWith('.webp')) {
        return 'image/webp';
      }
      if (lower.endsWith('.gif')) {
        return 'image/gif';
      }
      if (lower.endsWith('.heic')) {
        return 'image/heic';
      }
      if (lower.endsWith('.heif')) {
        return 'image/heif';
      }
      return 'image/png';
    }

    function normalizeImageDataUrl(dataUrl, mimeType) {
      if (typeof dataUrl !== 'string') {
        return dataUrl;
      }
      if (dataUrl.startsWith('data:image/')) {
        return dataUrl;
      }
      const commaIndex = dataUrl.indexOf(',');
      if (commaIndex < 0) {
        return dataUrl;
      }
      return `data:${mimeType};base64${dataUrl.slice(commaIndex)}`;
    }

    function clipboardImages(data) {
      if (!data) {
        return [];
      }
      const byKey = new Map();
      const addFile = (file) => {
        if (!isImageFile(file)) {
          return;
        }
        const key = `${file.name}:${file.size}:${file.type}:${file.lastModified}`;
        byKey.set(key, file);
      };
      [...data.files].forEach(addFile);
      [...data.items].forEach((item) => {
        if (item.kind === 'file' && (!item.type || item.type.startsWith('image/'))) {
          addFile(item.getAsFile());
        }
      });
      return [...byKey.values()];
    }

    async function saveWebConfig(event) {
      event.preventDefault();
      const token = controllerToken.value.trim();
      const homeserver = matrixHomeserver.value.trim();
      const allowedSender = matrixAllowedSender.value.trim();
      if (!token) {
        setConfigStatus('Controller Token 不能为空。', true);
        controllerToken.focus();
        return;
      }
      if (!homeserver || !allowedSender) {
        setConfigStatus('Matrix 主服务器 URL 和允许发指令的用户不能为空。', true);
        return;
      }

      configSave.disabled = true;
      setConfigStatus('正在保存配置...', false);
      try {
        const response = await fetch('/api/chat/matrix/local-config', {
          method: 'PUT',
          headers: {
            'content-type': 'application/json',
            'x-blockwright-token': token
          },
          body: JSON.stringify({
            enabled: matrixEnabled.checked,
            homeserver_url: homeserver,
            access_token: matrixAccessToken.value.trim(),
            allowed_sender: allowedSender,
            allow_own_user_messages: matrixAllowOwn.checked,
            auto_join_invites: matrixAutoJoin.checked,
            default_target_player: username.value.trim() || null
          })
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.message || payload.error || await response.text() || '保存失败');
        }
        setConfigStatus(payload.message || '配置已保存。', false);
      } catch (error) {
        setConfigStatus(error.message || '保存失败。', true);
      } finally {
        configSave.disabled = false;
      }
    }

    function closeConfigDialog() {
      if (typeof configDialog.close === 'function') {
        configDialog.close();
      } else {
        configDialog.removeAttribute('open');
      }
    }

    function setConfigStatus(message, isError) {
      configStatus.textContent = message;
      configStatus.classList.toggle('error', Boolean(isError));
    }

    function clearConfigStatus() {
      setConfigStatus('', false);
    }

    function renderPreview() {
      preview.replaceChildren();
      preview.hidden = pendingImages.length === 0;
      pendingImages.forEach((entry) => {
        const item = document.createElement('div');
        item.className = 'preview-item';
        const img = document.createElement('img');
        img.src = entry.url;
        img.alt = entry.file.name || '参考图片';
        const remove = document.createElement('button');
        remove.type = 'button';
        remove.className = 'remove-image';
        remove.textContent = '×';
        remove.title = '移除图片';
        remove.setAttribute('aria-label', `移除 ${entry.file.name || '图片'}`);
        remove.addEventListener('click', () => removeImage(entry.id));
        const name = document.createElement('div');
        name.className = 'preview-name';
        name.textContent = entry.file.name || '粘贴图片';
        item.append(img, remove, name);
        preview.appendChild(item);
      });
    }

    function removeImage(id) {
      const kept = [];
      pendingImages.forEach((entry) => {
        if (entry.id === id) {
          URL.revokeObjectURL(entry.url);
        } else {
          kept.push(entry);
        }
      });
      pendingImages = kept;
      renderPreview();
    }

    function clearComposer() {
      text.value = '';
      cameraImage.value = '';
      libraryImages.value = '';
      pendingImages.forEach((entry) => URL.revokeObjectURL(entry.url));
      pendingImages = [];
      renderPreview();
      resizeComposer();
    }

    function resizeComposer() {
      text.style.height = 'auto';
      text.style.height = `${Math.min(text.scrollHeight, 220)}px`;
    }

    function setVoicePanel(enabled) {
      const active = Boolean(enabled) && !voiceUnavailable;
      if (!active && voiceHoldActive) {
        cancelVoiceInput();
      }
      voicePanel.hidden = !active;
      text.hidden = active;
      send.hidden = active;
      inputShell.classList.toggle('voice-mode', active);
      voiceToggle.classList.toggle('active', active);
      voiceToggle.setAttribute('aria-pressed', String(active));
      voiceToggle.title = active ? '切换到文字输入' : '切换到语音输入';
      voiceToggle.setAttribute('aria-label', voiceToggle.title);
      localStorage.setItem('bw.voiceEnabled', active ? '1' : '0');
      if (active) {
        text.blur();
        resetVoiceHoldLabel();
      } else {
        resizeComposer();
      }
    }

    function resetVoiceHoldLabel() {
      voiceHoldText.textContent = voiceUnavailable || '按住说话，松手发送';
    }

    function startVoiceInput(event) {
      if (voiceUnavailable) {
        setStatus(voiceUnavailable, true);
        return;
      }
      if (send.disabled || voiceSending || voiceHoldActive) {
        return;
      }
      event?.preventDefault?.();
      if (event?.pointerId != null && voiceHold.setPointerCapture) {
        voiceHold.setPointerCapture(event.pointerId);
      }

      voiceFinalText = '';
      voiceInterimText = '';
      voiceStopping = false;
      voiceHadError = false;
      voiceHoldActive = true;
      recognition = new SpeechRecognitionCtor();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.onresult = handleVoiceResult;
      recognition.onerror = (error) => {
        voiceHadError = true;
        const message = voiceErrorMessage(error.error);
        setStatus(message, true);
      };
      recognition.onend = () => {
        const shouldFinish = voiceStopping && !voiceHadError;
        recognition = null;
        voiceHoldActive = false;
        voiceStopping = false;
        voiceHold.classList.remove('recording');
        if (shouldFinish) {
          voiceHold.classList.add('sending');
          voiceHoldText.textContent = '正在发送...';
          finishVoiceInput();
        } else {
          voiceHold.classList.remove('sending');
          resetVoiceHoldLabel();
        }
      };

      try {
        recognition.start();
        voiceHold.classList.add('recording');
        voiceHold.classList.remove('sending');
        voiceHoldText.textContent = '松手发送';
        setStatus('正在听，松手后会发送。', false);
      } catch (error) {
        recognition = null;
        voiceHoldActive = false;
        voiceHadError = true;
        voiceHold.classList.remove('recording');
        voiceHold.classList.remove('sending');
        resetVoiceHoldLabel();
        setStatus(error.message || '语音识别启动失败。', true);
      }
    }

    function handleVoiceResult(event) {
      let interim = '';
      for (let index = event.resultIndex; index < event.results.length; index += 1) {
        const result = event.results[index];
        const transcript = result[0]?.transcript || '';
        if (result.isFinal) {
          voiceFinalText += transcript;
        } else {
          interim += transcript;
        }
      }
      voiceInterimText = interim;
      const previewText = `${voiceFinalText}${voiceInterimText}`.trim();
      if (previewText) {
        setStatus(`已听到：${shortText(previewText, 56)}`, false);
      }
    }

    function stopVoiceInput(event) {
      if (!voiceHoldActive) {
        return;
      }
      event?.preventDefault?.();
      if (event?.pointerId != null && voiceHold.releasePointerCapture) {
        try {
          voiceHold.releasePointerCapture(event.pointerId);
        } catch (_) {
        }
      }
      voiceHoldActive = false;
      voiceStopping = true;
      voiceHoldText.textContent = '正在识别...';
      if (recognition) {
        recognition.stop();
      } else {
        finishVoiceInput();
      }
    }

    function cancelVoiceInput(event) {
      event?.preventDefault?.();
      voiceHoldActive = false;
      voiceStopping = false;
      voiceHadError = false;
      if (recognition) {
        recognition.abort();
      }
      recognition = null;
      voiceHold.classList.remove('recording');
      voiceHold.classList.remove('sending');
      resetVoiceHoldLabel();
      setStatus('语音输入已取消。', false);
    }

    async function finishVoiceInput() {
      if (voiceSending) {
        return;
      }
      const spokenText = `${voiceFinalText}${voiceInterimText}`.trim();
      voiceFinalText = '';
      voiceInterimText = '';
      voiceStopping = false;
      if (!spokenText) {
        voiceHold.classList.remove('sending');
        resetVoiceHoldLabel();
        setStatus('没有听清内容，按住再说一次。', true);
        return;
      }

      voiceSending = true;
      voiceHold.disabled = true;
      voiceHold.classList.add('sending');
      voiceHoldText.textContent = '正在发送...';
      try {
        text.value = spokenText;
        resizeComposer();
        await sendCurrentMessage();
      } catch (error) {
        text.value = spokenText;
        resizeComposer();
        setStatus(`${error.message || String(error)}，已保留语音文字。`, true);
      } finally {
        voiceSending = false;
        voiceHold.disabled = Boolean(voiceUnavailable);
        voiceHold.classList.remove('sending');
        resetVoiceHoldLabel();
      }
    }

    function voiceUnavailableMessage() {
      if (!SpeechRecognitionCtor) {
        return '当前浏览器不支持语音识别';
      }
      if (!window.isSecureContext && !isLocalhost()) {
        return '手机语音需要 HTTPS 地址';
      }
      return '';
    }

    function isLocalhost() {
      return ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
    }

    function voiceErrorMessage(code) {
      switch (code) {
        case 'not-allowed':
        case 'service-not-allowed':
          return '浏览器没有麦克风权限，允许后再试。';
        case 'no-speech':
          return '没有听到声音，按住再说一次。';
        case 'audio-capture':
          return '没有可用麦克风。';
        case 'network':
          return '语音识别服务暂时不可用。';
        default:
          return '语音识别失败。';
      }
    }

    function shortText(value, maxLength) {
      return value.length > maxLength ? `${value.slice(0, maxLength)}...` : value;
    }

    function sentImageSummary(count) {
      if (count === 0) {
        return '';
      }
      return count === 1 ? '发送了一张参考图片' : `发送了 ${count} 张参考图片`;
    }

    function messageTextForDisplay(value, imageCount) {
      const trimmed = value.trim();
      return trimmed || sentImageSummary(imageCount);
    }

    function imageDataUrls(uploads) {
      return uploads.map((upload) => upload.data_url).filter(Boolean);
    }

    function imageStatus(count) {
      if (count === 0) {
        return '';
      }
      return `，图片 ${count} 张`;
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      sendCurrentMessage();
    });

    async function sendCurrentMessage() {
      const name = username.value.trim();
      if (!name) {
        setStatus('先填用户名。', true);
        username.focus();
        return;
      }
      const voiceWasDisabled = voiceHold.disabled;
      send.disabled = true;
      voiceHold.disabled = true;
      stopJobPolling();
      setStatus('正在发送给 Blockwright...', false);
      let assistantMessage = null;
      let progressTimers = [];
      try {
        const currentText = text.value;
        const uploads = await Promise.all(pendingImages.map((entry) => readImage(entry.file)));
        const body = {
          username: name,
          target_player: name,
          text: currentText,
          images: uploads
        };
        addMessage('user', name, messageTextForDisplay(currentText, uploads.length), imageDataUrls(uploads));
        assistantMessage = addMessage('assistant', 'Blockwright', '正在接收消息...', []);
        assistantMessage.classList.add('pending');
        progressTimers = startRequestProgress(assistantMessage, uploads.length);
        const response = await fetch('/web/message', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify(body)
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.message || payload.error || await response.text() || '请求失败');
        }
        stopTimers(progressTimers);
        assistantMessage.classList.remove('pending');
        updateMessageBody(assistantMessage, payload.reply || '');
        if (payload.queued_job_id) {
          const queuedText = `进度：我已经准备好方案，正在等 Minecraft 接手${imageStatus(uploads.length)}`;
          setStatus(queuedText, false);
          setMessageProgress(assistantMessage, queuedText, false);
          startJobPolling(payload.queued_job_id, assistantMessage);
        } else {
          setStatus(`已回复${imageStatus(uploads.length)}`, false);
          clearMessageProgress(assistantMessage);
        }
        clearComposer();
      } catch (error) {
        stopTimers(progressTimers);
        const message = error.message || String(error);
        setStatus(message, true);
        if (assistantMessage) {
          assistantMessage.classList.remove('pending');
          assistantMessage.classList.add('error');
          updateMessageBody(assistantMessage, `这次没处理成功：${message}`);
          clearMessageProgress(assistantMessage);
        }
      } finally {
        send.disabled = false;
        voiceHold.disabled = voiceWasDisabled || Boolean(voiceUnavailable);
      }
    }

    function addMessage(kind, who, content, imageUrls) {
      const item = document.createElement('article');
      item.className = `message ${kind}`;
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = who;
      const body = document.createElement('div');
      body.className = 'message-body';
      body.textContent = content;
      item.append(meta, body);
      if (imageUrls && imageUrls.length > 0) {
        const gallery = document.createElement('div');
        gallery.className = 'message-images';
        imageUrls.forEach((url) => {
          const img = document.createElement('img');
          img.src = url;
          img.alt = '已发送图片';
          gallery.appendChild(img);
        });
        item.appendChild(gallery);
      }
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
      return item;
    }

    function updateMessageBody(item, content) {
      const body = item.querySelector('.message-body');
      if (body) {
        body.textContent = content;
      }
      messages.scrollTop = messages.scrollHeight;
    }

    function setMessageProgress(item, content, isError) {
      let progress = item.querySelector('.message-progress');
      if (!progress) {
        progress = document.createElement('div');
        progress.className = 'message-progress';
        item.appendChild(progress);
      }
      progress.textContent = content;
      progress.classList.toggle('error', Boolean(isError));
      messages.scrollTop = messages.scrollHeight;
    }

    function clearMessageProgress(item) {
      item.querySelector('.message-progress')?.remove();
    }

    function setStatus(value, isError) {
      statusEl.textContent = value;
      statusEl.classList.toggle('error', Boolean(isError));
    }

    function startRequestProgress(item, imageCount) {
      const imageHint = imageCount > 0 ? '，同时整理参考图片' : '';
      const phases = [
        {delay: 0, text: `正在接收消息${imageHint}...`},
        {delay: 900, text: '正在理解你想让我做什么...'},
        {delay: 2400, text: '正在思考下一步怎么做...'},
        {delay: 7000, text: '还在处理，可能正在结合场地或图片细节...'},
        {delay: 15000, text: '还在等回复，请稍等...'}
      ];
      return phases.map((phase) => setTimeout(() => {
        updateMessageBody(item, phase.text);
        setStatus(phase.text, false);
      }, phase.delay));
    }

    function stopTimers(timers) {
      timers.forEach((timer) => clearTimeout(timer));
    }

    function stopJobPolling() {
      if (activeJobPoll) {
        clearInterval(activeJobPoll);
        activeJobPoll = null;
      }
    }

    function startJobPolling(jobId, item) {
      stopJobPolling();
      let attempts = 0;
      const poll = async () => {
        attempts += 1;
        try {
          const response = await fetch(`/web/jobs/${encodeURIComponent(jobId)}/status`);
          if (!response.ok) {
            throw new Error('暂时看不到进度');
          }
          const payload = await response.json();
          const detail = payload.result_message ? `（${payload.result_message}）` : '';
          const message = `进度：${payload.message}${detail}`;
          const isError = payload.phase === 'failed';
          setStatus(message, isError);
          setMessageProgress(item, message, isError);
          if (payload.phase === 'succeeded' || payload.phase === 'failed') {
            stopJobPolling();
          }
        } catch (error) {
          if (attempts >= 3) {
            const message = error.message || String(error);
            setStatus(message, true);
            setMessageProgress(item, `进度：${message}`, true);
          }
        }
      };
      poll();
      activeJobPoll = setInterval(poll, 2000);
    }

    function readImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        const mimeType = imageMimeType(file);
        reader.onerror = () => reject(new Error(`${file.name} 读取失败`));
        reader.onload = () => resolve({
          file_name: file.name,
          mime_type: mimeType,
          data_url: normalizeImageDataUrl(reader.result, mimeType)
        });
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
